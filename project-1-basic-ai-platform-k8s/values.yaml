# Default values for basic-ai-platform.
# These defaults lean "safe/internal": no external exposure, generated secrets
# expected via -f values-secret.local.yaml. Use values-local.yaml for a laptop
# cluster or values-talos.yaml for the GitOps/Talos deployment.

# --- The external model server (Ollama/vLLM on the RTX 5080 box) --------------
# Addressed by IP directly — NO in-cluster Service. (A selector-less Service would
# need a hand-authored Endpoints/EndpointSlice, and ArgoCD here excludes both.)
# LiteLLM connects to localAi.baseUrl; Prometheus scrapes ip:9100/:9400 via a
# ScrapeConfig (existing kube-prom) or static targets (bundled prometheus).
aiServer:
  ip: "10.6.6.13"
  nodeExporterPort: 9100
  dcgmPort: 9400
# LiteLLM points here. Keep the host in sync with aiServer.ip; path ends in /v1.
localAi:
  baseUrl: "http://10.6.6.13:11434/v1"
  apiKey: "none"

# --- Secrets -----------------------------------------------------------------
# Three mutually-exclusive modes:
#   create=true            -> chart renders a Secret from .secrets.values (local/dev).
#                             Provide real values via a gitignored -f file; never commit them.
#   vault.enabled=true     -> chart renders SA + VaultAuth + VaultStaticSecret; VSO
#                             syncs the named Secret from Vault (Talos/prod).
#   existingSecret set     -> use a Secret you created out-of-band; chart renders neither.
#
# MANUAL SECRET (no Vault): when Vault isn't set up yet, create the Secret by hand
# and point the chart at it with existingSecret (also set create=false,
# vault.enabled=false, e.g. via values-manual-secret.yaml):
#
#   kubectl -n basic-ai-platform create secret generic basic-ai-platform-secrets \
#     --from-literal=postgresPassword="$(openssl rand -base64 32 | tr -d '\n/+=' | cut -c1-40)" \
#     --from-literal=litellmMasterKey="sk-$(openssl rand -base64 32 | tr -d '\n/+=' | cut -c1-40)" \
#     --from-literal=litellmSaltKey="$(openssl rand -hex 32)" \
#     --from-literal=webuiSecretKey="$(openssl rand -hex 32)" \
#     --from-literal=grafanaPassword="$(openssl rand -base64 24 | tr -d '\n/+=' | cut -c1-32)" \
#     --dry-run=client -o yaml | kubectl apply -f -
secrets:
  secretName: basic-ai-platform-secrets
  create: true
  existingSecret: ""
  # Filled in ONLY via a local -f override (see scripts/gen-secret-values.sh). Empty here on purpose.
  values:
    postgresPassword: ""
    litellmMasterKey: ""
    litellmSaltKey: ""
    webuiSecretKey: ""
    grafanaPassword: ""
  vault:
    enabled: false
    # KV-v2 mount + path holding the 5 keys above (same key names, camelCase).
    mount: secret
    path: basic-ai-platform
    role: basic-ai-platform
    refreshAfter: 60s

# --- Postgres (pgvector) -----------------------------------------------------
postgres:
  image: pgvector/pgvector:pg16
  user: aiplat
  db: aiplat          # bootstrap DB; init SQL also creates litellm/openwebui/knowledge
  storage:
    size: 10Gi
    storageClassName: ""   # "" = cluster default; set to openebs-replicated on Talos
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { memory: 1Gi }

# --- Redis (LiteLLM response cache) ------------------------------------------
redis:
  image: redis:7-alpine
  storage:
    size: 2Gi
    storageClassName: ""
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits: { memory: 256Mi }

# --- LiteLLM gateway ---------------------------------------------------------
litellm:
  image: ghcr.io/berriai/litellm:main-stable
  port: 4000
  resources:
    # LiteLLM's baseline RSS is ~600Mi-1Gi and spikes higher on startup with a
    # large model_list + the prometheus callback + DB store, so 1Gi OOM-kills it.
    requests: { cpu: 100m, memory: 512Mi }
    limits: { memory: 2Gi }

# --- Open WebUI --------------------------------------------------------------
openWebui:
  image: ghcr.io/open-webui/open-webui:main
  storage:
    size: 5Gi
    storageClassName: ""
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { memory: 1Gi }

# --- Observability -----------------------------------------------------------
# Two modes:
#   * Bundled (default): deploy our own Prometheus + Grafana (good for a laptop
#     cluster with no monitoring stack).
#   * Existing stack: set prometheus.enabled=false and grafana.enabled=false, then
#     turn on monitoring.serviceMonitors + monitoring.dashboards so an existing
#     kube-prometheus-stack scrapes LiteLLM/ai-server and imports the dashboard.
prometheus:
  enabled: true
  image: prom/prometheus:latest
  storage:
    size: 10Gi
    storageClassName: ""
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { memory: 1Gi }

# --- Grafana -----------------------------------------------------------------
grafana:
  enabled: true
  image: grafana/grafana:latest
  user: admin
  storage:
    size: 2Gi
    storageClassName: ""
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits: { memory: 512Mi }

# --- Integration with an EXISTING kube-prometheus-stack ----------------------
# Only meaningful when the bundled prometheus/grafana above are disabled.
monitoring:
  serviceMonitors:
    # Emit a ServiceMonitor for LiteLLM (:4000/metrics). Your kube-prom-stack has
    # serviceMonitorSelectorNilUsesHelmValues=false, so it's scraped with no extra
    # label; add labels here only if you tighten that selector later.
    enabled: false
    interval: 15s
    labels: {}
  scrapeConfig:
    # Scrape the external ai-server (node_exporter :9100, dcgm :9400) via a
    # Prometheus-Operator ScrapeConfig with static IP targets — no Service needed.
    # scrapeConfigSelectorNilUsesHelmValues defaults true, so the Prometheus
    # selects ScrapeConfigs by `release: <helm release>`. selectorLabels must
    # match that release (the kube-prom-stack ArgoCD Application name).
    enabled: false
    selectorLabels:
      release: kube-prom-stack
  dashboards:
    # Render the LiteLLM dashboard as a ConfigMap the kube-prom Grafana sidecar
    # auto-imports. The sidecar watches its own namespace by default, so this
    # ConfigMap is placed in `namespace` (where Grafana runs), not the app namespace.
    enabled: false
    namespace: monitoring
    label: grafana_dashboard
    labelValue: "1"

# --- External access ---------------------------------------------------------
# service.type governs the "flat" exposure for laptop clusters (NodePort) vs
# internal-only (ClusterIP). Gateway API (Cilium) is the Talos path.
service:
  type: ClusterIP        # local overlay sets NodePort for open-webui/grafana

gateway:
  enabled: false
  className: cilium
  clusterIssuer: letsencrypt
  # Which UIs get an HTTPRoute. Prometheus/LiteLLM stay internal by default.
  hosts:
    openWebui: ""        # e.g. ai.nuahs.net
    grafana: ""          # e.g. grafana-ai.nuahs.net
