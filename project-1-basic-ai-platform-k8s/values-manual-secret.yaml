# Use a hand-created Secret instead of Vault. Layer this AFTER values-talos.yaml
# to keep everything else (storage, gateway, monitoring) but skip Vault:
#
#   valueFiles:
#     - values-talos.yaml
#     - values-manual-secret.yaml
#
# First create the Secret manually (random values, correct keys/namespace):
#
#   kubectl -n basic-ai-platform create secret generic basic-ai-platform-secrets \
#     --from-literal=postgresPassword="$(openssl rand -base64 32 | tr -d '\n/+=' | cut -c1-40)" \
#     --from-literal=litellmMasterKey="sk-$(openssl rand -base64 32 | tr -d '\n/+=' | cut -c1-40)" \
#     --from-literal=litellmSaltKey="$(openssl rand -hex 32)" \
#     --from-literal=webuiSecretKey="$(openssl rand -hex 32)" \
#     --from-literal=grafanaPassword="$(openssl rand -base64 24 | tr -d '\n/+=' | cut -c1-32)" \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# This stops the chart from rendering the Vault objects (VaultAuth /
# VaultStaticSecret / ServiceAccount) so VSO and ArgoCD don't fight over the
# Secret; every pod's secretKeyRef still points at basic-ai-platform-secrets.
secrets:
  create: false
  existingSecret: basic-ai-platform-secrets
  vault:
    enabled: false
