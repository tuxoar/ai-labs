{{- if .Values.prometheus.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  labels:
    {{- include "bap.labels" . | nindent 4 }}
data:
  # Verbatim from the Compose stack. Targets resolve by Service name:
  # litellm:4000, and ai-server:9100 / :9400 via the selector-less ai-server Service.
  prometheus.yml: |
{{ .Files.Get "files/prometheus/prometheus.yml" | indent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  labels:
    {{- include "bap.labels" . | nindent 4 }}
spec:
  type: ClusterIP    # internal only — reached by Grafana; not exposed externally
  selector:
    {{- include "bap.selectorLabels" (dict "component" "prometheus") | nindent 4 }}
  ports:
    - name: http
      port: 9090
      targetPort: 9090
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus
  labels:
    {{- include "bap.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if .Values.prometheus.storage.storageClassName }}
  storageClassName: {{ .Values.prometheus.storage.storageClassName }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.prometheus.storage.size }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  labels:
    {{- include "bap.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "bap.selectorLabels" (dict "component" "prometheus") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "bap.selectorLabels" (dict "component" "prometheus") | nindent 8 }}
      annotations:
        checksum/config: {{ .Files.Get "files/prometheus/prometheus.yml" | sha256sum }}
    spec:
      securityContext:
        fsGroup: 65534       # nobody — lets Prometheus write to the PVC
      containers:
        - name: prometheus
          image: {{ .Values.prometheus.image }}
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
              readOnly: true
            - name: data
              mountPath: /prometheus
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            {{- toYaml .Values.prometheus.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: prometheus
{{- end }}
