# The external model server (Ollama + node_exporter + dcgm-exporter) modeled as
# a selector-less Service + manual Endpoints. This is the Kubernetes
# equivalent of the Compose `extra_hosts: ai-server:<ip>` mapping: in-cluster
# clients resolve "ai-server" and get routed to the real box. LiteLLM talks to
# :11434, Prometheus scrapes :9100 and :9400 — all by the name "ai-server".
apiVersion: v1
kind: Service
metadata:
  name: ai-server
  labels:
    app.kubernetes.io/name: ai-server
    {{- include "bap.labels" . | nindent 4 }}
spec:
  # No selector: endpoints are provided manually below.
  clusterIP: None
  ports:
    - name: ollama
      port: {{ .Values.aiServer.ollamaPort }}
      targetPort: {{ .Values.aiServer.ollamaPort }}
    - name: node-exporter
      port: {{ .Values.aiServer.nodeExporterPort }}
      targetPort: {{ .Values.aiServer.nodeExporterPort }}
    - name: dcgm
      port: {{ .Values.aiServer.dcgmPort }}
      targetPort: {{ .Values.aiServer.dcgmPort }}
---
# Classic core/v1 Endpoints (not discovery.k8s.io/EndpointSlice): ArgoCD is
# configured to exclude EndpointSlice, so we author the Endpoints object and let
# Kubernetes' EndpointSliceMirroring controller generate the matching slice.
apiVersion: v1
kind: Endpoints
metadata:
  name: ai-server        # must match the Service name above
  labels:
    {{- include "bap.labels" . | nindent 4 }}
subsets:
  - addresses:
      - ip: {{ .Values.aiServer.ip | quote }}
    ports:
      - name: ollama
        port: {{ .Values.aiServer.ollamaPort }}
      - name: node-exporter
        port: {{ .Values.aiServer.nodeExporterPort }}
      - name: dcgm
        port: {{ .Values.aiServer.dcgmPort }}
