{{- if .Values.monitoring.serviceMonitors.enabled }}
# ServiceMonitor for LiteLLM. Its Service has a selector, so Kubernetes creates
# the backing endpoints automatically (not tracked by ArgoCD), and the existing
# kube-prometheus-stack scrapes it.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: litellm
  labels:
    {{- include "bap.labels" . | nindent 4 }}
    {{- with .Values.monitoring.serviceMonitors.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.monitoring.serviceMonitors.interval }}
{{- end }}
{{- if .Values.monitoring.scrapeConfig.enabled }}
---
# The external ai-server has no in-cluster Service (ArgoCD excludes Endpoints/
# EndpointSlice), so scrape its node_exporter + dcgm-exporter by static IP.
apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: ai-server
  labels:
    {{- include "bap.labels" . | nindent 4 }}
    {{- with .Values.monitoring.scrapeConfig.selectorLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  metricsPath: /metrics
  staticConfigs:
    - targets:
        - {{ printf "%s:%v" .Values.aiServer.ip .Values.aiServer.nodeExporterPort | quote }}
        - {{ printf "%s:%v" .Values.aiServer.ip .Values.aiServer.dcgmPort | quote }}
      labels:
        host: ai-server
{{- end }}
