{{- if and .Values.secrets.create (not .Values.secrets.existingSecret) (not .Values.secrets.vault.enabled) }}
# Local/dev credentials. Values come from a gitignored -f override
# (scripts/gen-secret-values.sh). NEVER commit real values into the chart.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.secretName }}
  labels:
    {{- include "bap.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgresPassword: {{ required "secrets.values.postgresPassword is required when secrets.create=true (use scripts/gen-secret-values.sh)" .Values.secrets.values.postgresPassword | quote }}
  litellmMasterKey: {{ required "secrets.values.litellmMasterKey is required" .Values.secrets.values.litellmMasterKey | quote }}
  litellmSaltKey: {{ required "secrets.values.litellmSaltKey is required" .Values.secrets.values.litellmSaltKey | quote }}
  webuiSecretKey: {{ required "secrets.values.webuiSecretKey is required" .Values.secrets.values.webuiSecretKey | quote }}
  grafanaPassword: {{ required "secrets.values.grafanaPassword is required" .Values.secrets.values.grafanaPassword | quote }}
{{- end }}
{{- if .Values.secrets.vault.enabled }}
---
# Vault Secrets Operator path: sync KV keys into a Kubernetes Secret named
# {{ .Values.secrets.secretName }}. The KV at {{ .Values.secrets.vault.mount }}/{{ .Values.secrets.vault.path }}
# must contain: postgresPassword, litellmMasterKey, litellmSaltKey, webuiSecretKey, grafanaPassword.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.secrets.vault.role }}
  labels:
    {{- include "bap.labels" . | nindent 4 }}
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: {{ .Values.secrets.vault.role }}
  labels:
    {{- include "bap.labels" . | nindent 4 }}
spec:
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: {{ .Values.secrets.vault.role }}
    serviceAccount: {{ .Values.secrets.vault.role }}
    audiences:
      - vault
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: {{ .Values.secrets.secretName }}
  labels:
    {{- include "bap.labels" . | nindent 4 }}
spec:
  vaultAuthRef: {{ .Values.secrets.vault.role }}
  mount: {{ .Values.secrets.vault.mount }}
  path: {{ .Values.secrets.vault.path }}
  type: kv-v2
  refreshAfter: {{ .Values.secrets.vault.refreshAfter }}
  destination:
    create: true
    name: {{ .Values.secrets.secretName }}
{{- end }}
