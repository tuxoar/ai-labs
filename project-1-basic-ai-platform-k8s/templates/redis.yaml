apiVersion: v1
kind: Service
metadata:
  name: redis
  labels:
    {{- include "bap.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "bap.selectorLabels" (dict "component" "redis") | nindent 4 }}
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  labels:
    {{- include "bap.labels" . | nindent 4 }}
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      {{- include "bap.selectorLabels" (dict "component" "redis") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "bap.selectorLabels" (dict "component" "redis") | nindent 8 }}
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          # Same persistence + log level as the Compose command.
          args: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.redis.storage.storageClassName }}
        storageClassName: {{ .Values.redis.storage.storageClassName }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.redis.storage.size }}
