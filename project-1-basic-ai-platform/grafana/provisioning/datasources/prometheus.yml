apiVersion: 1

# Remove any previously-provisioned Prometheus datasource first, so changing its
# uid below doesn't fail with "data source not found" against the persisted one.
deleteDatasources:
  - name: Prometheus
    orgId: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
